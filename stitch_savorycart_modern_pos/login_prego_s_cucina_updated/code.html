<!-- Simple Script for Keypad Interaction Demonstration -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const dots = document.querySelectorAll('.pin-dot');
            const keypadBtns = document.querySelectorAll('.keypad-btn');
            const btnDelete = document.getElementById('btn-delete');
            const btnClear = document.getElementById('btn-clear');
            let currentPinLength = 0;
            const MAX_PIN = 4;

            function updateDots() {
                dots.forEach((dot, index) => {
                    if (index < currentPinLength) {
                        dot.classList.add('filled', 'bg-primary', 'border-primary');
                        dot.classList.remove('border-outline-variant');
                    } else {
                        dot.classList.remove('filled', 'bg-primary', 'border-primary');
                        dot.classList.add('border-outline-variant');
                    }
                });
            }

            keypadBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    if (currentPinLength < MAX_PIN) {
                        currentPinLength++;
                        updateDots();
                        
                        // Provide haptic feedback if supported
                        if (navigator.vibrate) {
                            navigator.vibrate(50);
                        }
                    }
                });
            });

            btnDelete.addEventListener('click', () => {
                if (currentPinLength > 0) {
                    currentPinLength--;
                    updateDots();
                }
            });

            btnClear.addEventListener('click', () => {
                currentPinLength = 0;
                updateDots();
            });
        });
    </script>
